name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install protobuf
        run: brew install protobuf

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2

      - name: Build release
        run: MACOSX_DEPLOYMENT_TARGET=14.0 cargo build --release -p warp --bin warplocal

      - name: Create .app bundle
        run: |
          mkdir -p WarpLocal.app/Contents/MacOS WarpLocal.app/Contents/Resources
          cp target/release/warplocal WarpLocal.app/Contents/MacOS/warplocal

      - name: Create DMG
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          hdiutil create \
            -volname "WarpLocal" \
            -srcfolder "WarpLocal.app" \
            -ov \
            -format UDZO \
            "WarpLocal-v${VERSION}.dmg"

      - name: Generate release notes
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          cat > RELEASE_NOTES.md << EOF
          ## WarpLocal v${VERSION}

          ### What's New
          - Full terminal emulation with GPU rendering
          - Agent mode with persistent context
          - Local AI inference via your own LLM API

          ### Requirements
          - macOS 14.0+ (Apple Silicon)
          - An OpenAI-compatible LLM API

          ### Installation
          1. Download \`WarpLocal-v${VERSION}.dmg\`
          2. Open the DMG and drag WarpLocal.app to /Applications
          3. Launch WarpLocal and configure your API

          ### Known Issues
          - First launch may require right-click > Open to bypass Gatekeeper
          EOF

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: WarpLocal ${{ github.ref_name }}
          body_path: RELEASE_NOTES.md
          files: WarpLocal-v*.dmg
          draft: true
